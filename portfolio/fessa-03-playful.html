<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8" />
<title>Fessa Studio - 03-playful</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Inter+Tight:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=IBM+Plex+Mono:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #0e0b1a; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; height: 100%; }
  #root, #root > div { width: 100vw; min-height: 100vh; }
  img { pointer-events: none; user-select: none; }
</style>
<style id="mobile-override">
/* Mobile responsive overrides — Playful. Breakpoints: 768 / 560 / 380. */
html, body, #root { overflow-x: hidden; }

@media (max-width: 768px) {
  [style*="font-size: clamp(80px, 11vw, 200px)"],
  [style*="font-size: clamp(80px, 12vw, 200px)"] {
    font-size: clamp(40px, 11vw, 104px) !important; line-height: 1.05 !important;
    overflow-wrap: break-word; hyphens: auto;
  }
  [style*="font-size: clamp(56px, 7vw, 112px)"] {
    font-size: clamp(28px, 7vw, 64px) !important; line-height: 1.1 !important;
    overflow-wrap: break-word; hyphens: auto;
  }
  [style*="font-size: 72"],[style*="font-size: 64"],[style*="font-size: 56"] {
    font-size: clamp(24px, 6vw, 40px) !important; line-height: 1.1 !important;
  }
  [style*="font-size: 48"],[style*="font-size: 44"],[style*="font-size: 40"],[style*="font-size: 36"] {
    font-size: clamp(20px, 5vw, 32px) !important; line-height: 1.15 !important;
  }
  .v3-step, [style*="grid-template-columns: 1fr 1fr 1fr 1fr"],
  [style*="grid-template-columns: repeat(4"] {
    grid-template-columns: repeat(2, 1fr) !important; gap: 16px !important;
  }
  [style*="grid-template-columns: 1fr 1fr 1fr"]:not([style*="1fr 1fr 1fr 1fr"]),
  [style*="grid-template-columns: repeat(3"] {
    grid-template-columns: repeat(2, 1fr) !important; gap: 20px !important;
  }
  [style*="grid-template-columns: repeat(6"],
  [style*="grid-template-columns: repeat(12"] {
    grid-template-columns: repeat(3, 1fr) !important;
  }
  [style*="grid-template-columns: 1fr 1fr"]:not([style*="1fr 1fr 1fr"]),
  [style*="grid-template-columns: 1.15fr 1fr"],
  [style*="grid-template-columns: 1.2fr 1fr"],
  [style*="grid-template-columns: 1.3fr 1fr"]:not([style*="1.3fr 1fr 1fr"]),
  [style*="grid-template-columns: 1.5fr 1fr"],
  [style*="grid-template-columns: 2fr 1fr"],
  [style*="grid-template-columns: 1fr 2fr"] {
    grid-template-columns: 1fr !important; gap: 32px !important;
  }
  [style*="padding: '160px"],[style*="padding: '140px"],[style*="padding: '120px"],
  [style*="padding: '100px"],[style*="padding: '96px"],[style*="padding: '80px"] {
    padding: 56px 20px !important;
  }
  nav[style*="gap: 36"], nav[style*="gap: 40"], nav[style*="gap: 28"] {
    display: none !important;
  }
}

@media (max-width: 560px) {
  [style*="font-size: clamp(80px, 11vw, 200px)"],
  [style*="font-size: clamp(80px, 12vw, 200px)"] {
    font-size: clamp(32px, 11vw, 60px) !important;
  }
  [style*="font-size: clamp(56px, 7vw, 112px)"] {
    font-size: clamp(24px, 8vw, 40px) !important;
  }
  .v3-step, [style*="grid-template-columns: 1fr 1fr 1fr 1fr"],
  [style*="grid-template-columns: 1fr 1fr 1fr"]:not([style*="1fr 1fr 1fr 1fr"]),
  [style*="grid-template-columns: repeat(3"],
  [style*="grid-template-columns: repeat(4"] {
    grid-template-columns: 1fr !important;
  }
  [style*="grid-template-columns: repeat(6"],
  [style*="grid-template-columns: repeat(12"] {
    grid-template-columns: repeat(2, 1fr) !important;
  }
  [style*="padding: '160px"],[style*="padding: '140px"],[style*="padding: '120px"],
  [style*="padding: '100px"],[style*="padding: '96px"],[style*="padding: '80px"],
  [style*="padding: '64px"] {
    padding: 40px 16px !important;
  }
}

@media (max-width: 380px) {
  [style*="font-size: clamp(80px, 11vw, 200px)"],
  [style*="font-size: clamp(80px, 12vw, 200px)"] {
    font-size: clamp(28px, 10vw, 44px) !important;
  }
  [style*="font-size: clamp(56px, 7vw, 112px)"] {
    font-size: clamp(22px, 8vw, 32px) !important;
  }
  [style*="grid-template-columns: repeat(6"],
  [style*="grid-template-columns: repeat(12"] {
    grid-template-columns: 1fr !important;
  }
}

@media (hover: none) {
  *:hover { transform: none !important; }
}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style id="mobile-safety-net-v2">
/* ===== Mobile safety net (v2) — voorkomt horizontal scroll + fixt image-breakage ===== */
@media (max-width: 900px) {
  /* Geen horizontal scroll, punt. */
  html, body { overflow-x: hidden !important; max-width: 100vw; }
  #root { overflow-x: hidden; max-width: 100vw; }

  /* Responsive media defaults */
  img, video, picture, iframe, svg { max-width: 100% !important; }
  img, video, picture { height: auto; }

  /* Neutralize brede inline min-widths (React inline styles) */
  [style*="min-width: 12"], [style*="min-width: 13"], [style*="min-width: 14"],
  [style*="min-width: 15"], [style*="min-width: 16"], [style*="min-width: 18"],
  [style*="min-width: 20"], [style*="min-width: 24"], [style*="min-width: 28"],
  [style*="min-width:12"], [style*="min-width:14"], [style*="min-width:16"] {
    min-width: 0 !important;
  }

  /* Forceer vloeiende breedte voor containers met vaste >1200px width */
  [style*="width: 1200"], [style*="width: 1280"], [style*="width: 1320"],
  [style*="width: 1400"], [style*="width: 1440"], [style*="width: 1600"] {
    width: 100% !important;
    max-width: 100% !important;
  }

  /* Fix grid-auto-rows conflicten die images platdrukken op gestackte grids */
  .show-g, .cat-grid, .work-grid, .gal-g, .cuts,
  .quick-g, .team-g, .rev-g, .press-logos,
  .how-grid, .hero-bot, .menu-row, .counters,
  .foot-g, .grid-4, .fp-g, .specs-g,
  .v1-row, .v3-step, .v4-service {
    grid-auto-rows: auto !important;
  }

  /* Image-containers die op desktop via grid-height vulden — geef ze een aspect */
  .cut img, .w img, .wk img, .m img, .hv-main img, .hero-img img,
  .s .img img, .phil-im img, .gal-g img, .news img, .split-image img,
  .team img, .cat-grid img, .work-grid img, .press-logos img,
  .r img, .rev-card img {
    width: 100% !important;
    height: 100% !important;
    object-fit: cover;
  }

  /* Hero-visual containers: geen rigide min-height op mobiel */
  .hero-img, .hero-vis, .hv-main, .hero-im, .phil-im {
    min-height: 0 !important;
  }
}

@media (max-width: 560px) {
  /* Hero-visuals krijgen een vriendelijke ratio in plaats van 520px hoog */
  .hero-img, .hv-main, .phil-im, .hero-im {
    aspect-ratio: 4/3 !important;
    height: auto !important;
  }

  /* Cells in eerder grid-auto-rows grids hun eigen ratio */
  .cut, .w, .wk, .m {
    aspect-ratio: 3/2 !important;
    height: auto !important;
  }

  /* Tabel-achtige grids met expliciete px-kolommen platslaan */
  [style*="gridTemplateColumns: '80px"],
  [style*="grid-template-columns: 80px"],
  [style*="gridTemplateColumns: 'auto 1fr auto auto"],
  .table-row, .w-row {
    display: flex !important;
    flex-direction: column !important;
    gap: 6px !important;
  }

  /* Tickers/marquees minder agressief op small screens */
  .marq, .ticker, .ticker-track {
    font-size: 16px !important;
  }
}

@media (max-width: 380px) {
  /* Nog smaller: alles single-column */
  [style*="gridTemplateColumns"], [style*="grid-template-columns"] {
    grid-template-columns: 1fr !important;
  }
  /* Extra tight padding op kleinste telefoon */
  section, .sec, .wrap { padding-left: 14px !important; padding-right: 14px !important; }
}
</style>
<link rel="stylesheet" href="/assets/mobile-v3-global.css">
<style id="mobile-v3-patches">
  @media (max-width: 700px) {
    /* Hero 3-col grids -> 1 col */
    [style*="gridTemplateColumns: '1.3fr 1fr 1fr'"],
    [style*="gridTemplateColumns: '1.4fr 1fr 1.2fr'"] {
      grid-template-columns: 1fr !important;
      gap: 20px !important;
    }
    /* Hide status pill "2 plekken Q4" on mobile */
    .v3-status-pill { display: none !important; }
    /* CTA wrap */
    [style*="display: 'flex'"][style*="gap"] { flex-wrap: wrap; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
// Variation 3 — Playful & experimental
// Dark background, sharp lime accent, unexpected layout rhythm,
// cursor-following blob, rotated tags, overlapping cards.
// The studio as creative and energetic.

const V3 = () => {
  const v3Styles = {
    bg: '#0f100d',
    ink: '#f4f1e8',
    dim: '#8b8a80',
    accent: '#d4ff3a',
    accent2: '#ff7a3a',
    sans: '"Inter Tight", "Inter", system-ui, sans-serif',
    display: '"Instrument Serif", "Playfair Display", Georgia, serif',
    mono: '"JetBrains Mono", ui-monospace, monospace',
  };

  const ref = React.useRef(null);
  const [mouse, setMouse] = React.useState({ x: 0.5, y: 0.3 });
  const onMove = (e) => {
    const r = ref.current?.getBoundingClientRect();
    if (!r) return;
    setMouse({ x: (e.clientX - r.left) / r.width, y: (e.clientY - r.top) / r.height });
  };

  const Img = ({ src, h = 300, tag, tilt = 0, ring = false }) => (
    <div style={{
      position: 'relative', height: h, borderRadius: 2,
      overflow: 'hidden', transform: `rotate(${tilt}deg)`,
      boxShadow: ring ? `0 0 0 1px ${v3Styles.accent}, 0 20px 60px rgba(0,0,0,0.4)` : '0 20px 60px rgba(0,0,0,0.4)',
    }}>
      <img src={src} alt="" style={{ width: '100%', height: '100%', objectFit: 'cover', display: 'block', filter: 'saturate(0.85) contrast(1.05)' }} />
      {tag && (
        <div style={{
          position: 'absolute', left: 12, bottom: 12,
          background: v3Styles.accent, color: v3Styles.bg,
          padding: '4px 10px', fontFamily: v3Styles.mono, fontSize: 11,
          letterSpacing: '0.05em', textTransform: 'uppercase',
        }}>{tag}</div>
      )}
    </div>
  );

  const projects = [
    { t: 'Noorderhaven', k: 'identiteit + web', y: '25', img: 'https://images.unsplash.com/photo-1497366216548-37526070297c?w=900&q=80', tilt: -1.2 },
    { t: 'Stroom Koffie', k: 'e-commerce', y: '25', img: 'https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=900&q=80', tilt: 0.8 },
    { t: 'Museum De Wijk', k: 'platform', y: '24', img: 'https://images.unsplash.com/photo-1545987796-200677ee1011?w=900&q=80', tilt: -0.6 },
    { t: 'Kade 17', k: 'website', y: '24', img: 'https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?w=900&q=80', tilt: 1.1 },
  ];

  return (
    <div
      ref={ref}
      onMouseMove={onMove}
      style={{
        width: '100%', height: '100%', overflow: 'auto',
        background: v3Styles.bg, color: v3Styles.ink,
        fontFamily: v3Styles.sans,
        position: 'relative',
      }}
    >
      {/* Cursor blob */}
      <div style={{
        position: 'fixed',
        left: `calc(${mouse.x * 100}% - 200px)`,
        top: `calc(${mouse.y * 100}% - 200px)`,
        width: 400, height: 400, borderRadius: '50%',
        background: `radial-gradient(circle, ${v3Styles.accent}22 0%, transparent 65%)`,
        pointerEvents: 'none', transition: 'left 0.4s ease-out, top 0.4s ease-out',
        zIndex: 1,
      }} />

      {/* Nav */}
      <div style={{
        position: 'sticky', top: 0, zIndex: 10,
        background: 'rgba(15,16,13,0.85)', backdropFilter: 'blur(10px)',
        borderBottom: `1px solid rgba(244,241,232,0.08)`,
      }}>
        <div style={{ maxWidth: 1400, margin: '0 auto', padding: '18px 32px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, fontSize: 17, fontWeight: 500 }}>
            <div style={{ width: 10, height: 10, borderRadius: '50%', background: v3Styles.accent, boxShadow: `0 0 12px ${v3Styles.accent}` }} />
            fessa/studio
          </div>
          <nav style={{ display: 'flex', gap: 28, fontSize: 14 }}>
            {[['werk', '#werk'], ['studio', '#studio'], ['diensten', '#diensten'], ['contact', '#contact']].map(([t, h]) => (
              <a key={t} href={h} className="v3-link" style={{ color: v3Styles.ink, textDecoration: 'none' }}>{t}</a>
            ))}
          </nav>
          <div className="v3-status-pill" style={{ display: 'flex', gap: 12, alignItems: 'center' }}>
            <div style={{ fontFamily: v3Styles.mono, fontSize: 11, color: v3Styles.dim }}>
              <span style={{ color: v3Styles.accent }}>●</span> 2 plekken Q4
            </div>
          </div>
        </div>
      </div>

      {/* Hero */}
      <section style={{ padding: '100px 32px 80px', position: 'relative', zIndex: 2 }}>
        <div style={{ maxWidth: 1400, margin: '0 auto' }}>
          <div style={{ fontFamily: v3Styles.mono, fontSize: 12, color: v3Styles.dim, marginBottom: 32, letterSpacing: '0.05em' }}>
            ↓ fessa studio / een digitale studio uit utrecht
          </div>

          <h1 style={{
            fontWeight: 500, fontSize: 'clamp(80px, 11vw, 200px)',
            lineHeight: 0.9, letterSpacing: '-0.04em', margin: 0,
          }}>
            We maken<br />
            <span style={{ fontFamily: v3Styles.display, fontStyle: 'italic', fontWeight: 400 }}>
              het internet
            </span><br />
            <span style={{ position: 'relative' }}>
              weer leuk
              <svg style={{ position: 'absolute', right: -60, top: 20, transform: 'rotate(12deg)' }} width="80" height="80" viewBox="0 0 80 80">
                <path d="M20 40 Q40 10 60 40 Q40 70 20 40" fill="none" stroke={v3Styles.accent} strokeWidth="2" />
                <circle cx="40" cy="40" r="6" fill={v3Styles.accent} />
              </svg>
            </span>
            <span style={{ color: v3Styles.accent }}>.</span>
          </h1>

          <div style={{ marginTop: 72, display: 'grid', gridTemplateColumns: '1.3fr 1fr 1fr', gap: 40, alignItems: 'start' }}>
            <p style={{ fontSize: 22, lineHeight: 1.45, margin: 0, maxWidth: 520, fontWeight: 400 }}>
              Fessa is een kleine digitale studio. We bouwen websites, webshops en platformen voor mensen met goede smaak en een scherp idee.
            </p>
            <div style={{ fontFamily: v3Styles.mono, fontSize: 12, lineHeight: 1.9, color: v3Styles.dim, letterSpacing: '0.03em' }}>
              [ est. 2019 ]<br />
              [ utrecht ✦ nl ]<br />
              [ 3 people ]<br />
              [ ~8 projects/yr ]
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 12, alignItems: 'flex-start' }}>
              <a href="#werk" className="v3-btn" style={{
                background: v3Styles.accent, color: v3Styles.bg, padding: '14px 22px',
                fontSize: 15, fontWeight: 600, textDecoration: 'none',
                display: 'inline-flex', alignItems: 'center', gap: 8,
              }}>Bekijk ons werk <span>→</span></a>
              <a href="#contact" className="v3-btn" style={{
                border: `1px solid ${v3Styles.ink}`, color: v3Styles.ink, padding: '14px 22px',
                fontSize: 15, textDecoration: 'none',
                display: 'inline-flex', alignItems: 'center', gap: 8,
              }}>Koffie drinken ☕</a>
            </div>
          </div>
        </div>
      </section>

      {/* Image strip with rotated labels */}
      <section style={{ padding: '40px 32px 120px', position: 'relative', zIndex: 2 }}>
        <div style={{ maxWidth: 1400, margin: '0 auto', display: 'grid', gridTemplateColumns: '1.4fr 1fr 1.2fr', gap: 32, alignItems: 'center' }}>
          <Img src="https://images.unsplash.com/photo-1558655146-9f40138edfeb?w=1000&q=80" h={380} tag="recent" tilt={-1.2} />
          <div style={{ textAlign: 'center' }}>
            <div style={{ fontFamily: v3Styles.display, fontSize: 72, fontStyle: 'italic', lineHeight: 0.95, letterSpacing: '-0.02em' }}>
              <span style={{ color: v3Styles.accent }}>✦</span><br />handgebouwd<br />
              <span style={{ fontFamily: v3Styles.sans, fontSize: 15, fontStyle: 'normal', color: v3Styles.dim, letterSpacing: '0.05em', textTransform: 'uppercase' }}>geen templates, geen shortcuts</span>
            </div>
          </div>
          <Img src="https://images.unsplash.com/photo-1481487196290-c152efe083f5?w=1000&q=80" h={440} tag="detail" tilt={1.5} ring />
        </div>
      </section>

      {/* Projects */}
      <section id="werk" style={{ padding: '80px 32px', position: 'relative', zIndex: 2, borderTop: `1px solid rgba(244,241,232,0.08)` }}>
        <div style={{ maxWidth: 1400, margin: '0 auto' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'end', marginBottom: 56 }}>
            <h2 style={{ fontSize: 72, fontWeight: 500, margin: 0, letterSpacing: '-0.03em' }}>
              <span style={{ color: v3Styles.dim, fontSize: 20, fontFamily: v3Styles.mono, verticalAlign: 'top', marginRight: 12 }}>(01)</span>
              Recent werk
            </h2>
            <a href="#" style={{ color: v3Styles.accent, fontSize: 15, textDecoration: 'none', borderBottom: `1px dashed ${v3Styles.accent}`, paddingBottom: 2 }}>alle projecten →</a>
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '64px 40px' }}>
            {projects.map((p, i) => (
              <div key={p.t} className="v3-project" style={{
                paddingTop: i % 2 === 1 ? 64 : 0,
              }}>
                <div className="v3-imgwrap" style={{ transform: `rotate(${p.tilt}deg)`, transition: 'transform 0.4s ease' }}>
                  <img src={p.img} alt="" style={{ width: '100%', height: 420, objectFit: 'cover', display: 'block', filter: 'saturate(0.9)' }} />
                </div>
                <div style={{ marginTop: 20, display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' }}>
                  <div>
                    <div style={{ fontSize: 28, fontWeight: 500, letterSpacing: '-0.015em' }}>{p.t}</div>
                    <div style={{ fontFamily: v3Styles.mono, fontSize: 12, color: v3Styles.dim, marginTop: 4 }}>{p.k}</div>
                  </div>
                  <div style={{ fontFamily: v3Styles.mono, fontSize: 12, color: v3Styles.accent }}>'{p.y}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* How we work — ticker list */}
      <section id="diensten" style={{ padding: '120px 32px', position: 'relative', zIndex: 2 }}>
        <div style={{ maxWidth: 1400, margin: '0 auto' }}>
          <div style={{ fontFamily: v3Styles.mono, fontSize: 12, color: v3Styles.dim, marginBottom: 20 }}>(02) — zo werken we</div>
          <h2 style={{ fontSize: 'clamp(56px, 7vw, 112px)', fontWeight: 500, lineHeight: 0.95, letterSpacing: '-0.035em', margin: '0 0 72px', maxWidth: 1100 }}>
            <span style={{ fontFamily: v3Styles.display, fontStyle: 'italic', fontWeight: 400 }}>Klein team</span>, groot werk.<br />
            Van idee tot live in <span style={{ color: v3Styles.accent }}>8—12 weken</span>.
          </h2>

          {[
            { n: '01', t: 'Kennismaken', d: 'Koffie, vragen, eerlijke inschatting. Geen verkooppraatje — we kijken of het klikt en of het plan hout snijdt.' },
            { n: '02', t: 'Strategie & concept', d: 'Positionering, informatiearchitectuur, conceptrichtingen. De fundering waar de rest op staat.' },
            { n: '03', t: 'Design', d: 'Meerdere richtingen, één die het wordt. We ontwerpen op maat van je merk — geen uit de doos.' },
            { n: '04', t: 'Bouw & lancering', d: 'Maatwerk in Next.js, Astro of Sanity. Snel, toegankelijk, goed vindbaar. En daarna nog vaak genoeg contact.' },
          ].map((s, i) => (
            <div
              key={s.n}
              className="v3-step"
              style={{
                display: 'grid', gridTemplateColumns: '80px 280px 1fr 40px',
                gap: 32, alignItems: 'center', padding: '28px 0',
                borderTop: `1px solid rgba(244,241,232,0.1)`,
                borderBottom: i === 3 ? `1px solid rgba(244,241,232,0.1)` : 'none',
              }}
            >
              <div style={{ fontFamily: v3Styles.mono, fontSize: 14, color: v3Styles.dim }}>({s.n})</div>
              <div style={{ fontFamily: v3Styles.display, fontSize: 40, fontStyle: 'italic', letterSpacing: '-0.015em' }}>{s.t}</div>
              <div style={{ fontSize: 17, lineHeight: 1.5, color: '#c9c7bf', maxWidth: 680 }}>{s.d}</div>
              <div style={{ fontSize: 20, color: v3Styles.accent, textAlign: 'right' }}>→</div>
            </div>
          ))}
        </div>
