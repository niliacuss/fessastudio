<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8" />
<title>Fessa Studio - 01-editorial</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Inter+Tight:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=IBM+Plex+Mono:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #0e0b1a; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; height: 100%; }
  #root, #root > div { width: 100vw; min-height: 100vh; }
  img { pointer-events: none; user-select: none; }
</style>
<style id="mobile-override">
/* Mobile responsive overrides voor React inline-style layout.
   Targets rendered CSS (kebab-case) via [style*=...] attribute selectors.
   Breakpoints: 768 / 560 / 380. */
html, body, #root { overflow-x: hidden; }

@media (max-width: 768px) {
  /* ---- Hero/CTA typografie met clamp ---- */
  [style*="font-size: clamp(72px, 8vw, 128px)"],
  [style*="font-size: 128"],[style*="font-size: 112"],[style*="font-size: 104"] {
    font-size: clamp(32px, 9vw, 64px) !important;
    line-height: 1.1 !important;
    overflow-wrap: break-word; hyphens: auto;
  }
  [style*="font-size: clamp(56px, 6vw, 96px)"],
  [style*="font-size: 96"],[style*="font-size: 88"] {
    font-size: clamp(28px, 7vw, 52px) !important;
    line-height: 1.1 !important;
    overflow-wrap: break-word; hyphens: auto;
  }
  [style*="font-size: 72"],[style*="font-size: 64"],[style*="font-size: 56"] {
    font-size: clamp(26px, 6.5vw, 44px) !important; line-height: 1.1 !important;
  }
  [style*="font-size: 48"],[style*="font-size: 44"],[style*="font-size: 40"],[style*="font-size: 36"] {
    font-size: clamp(20px, 5vw, 32px) !important; line-height: 1.15 !important;
  }
  /* ---- Grid-reducties ---- */
  /* 4-col .v1-row → 2 kol */
  [style*="grid-template-columns: 1fr 1fr 1fr 1fr"],
  [style*="grid-template-columns: repeat(4"] {
    grid-template-columns: repeat(2, 1fr) !important; gap: 16px !important;
  }
  /* 3-col → 2 kol */
  [style*="grid-template-columns: 1fr 1fr 1fr"]:not([style*="1fr 1fr 1fr 1fr"]),
  [style*="grid-template-columns: 1.3fr 1fr 1fr"],
  [style*="grid-template-columns: 1.4fr 1fr 1.2fr"] {
    grid-template-columns: repeat(2, 1fr) !important; gap: 20px !important;
  }
  /* 2-col variants → 1 kol */
  [style*="grid-template-columns: 1fr 1fr"]:not([style*="1fr 1fr 1fr"]),
  [style*="grid-template-columns: 1.15fr 1fr"],
  [style*="grid-template-columns: 1.2fr 1fr"],
  [style*="grid-template-columns: 1.3fr 1fr"]:not([style*="1.3fr 1fr 1fr"]),
  [style*="grid-template-columns: 1.4fr 1fr"]:not([style*="1.4fr 1fr 1.2fr"]),
  [style*="grid-template-columns: 1.5fr 1fr"],
  [style*="grid-template-columns: 1fr 1.5fr"],
  [style*="grid-template-columns: 1fr 2fr"],
  [style*="grid-template-columns: 2fr 1fr"],
  [style*="grid-template-columns: 200px 1fr"],
  [style*="grid-template-columns: 40px 1fr"] {
    grid-template-columns: 1fr !important; gap: 32px !important;
  }
  /* Complex table grids → stack */
  [style*="80px 1fr 1fr 100px"],
  [style*="80px 1fr 1fr 60px"],
  [style*="80px 280px 1fr 40px"],
  [style*="80px 1fr 2fr 120px"] {
    grid-template-columns: 1fr !important; gap: 12px !important;
  }
  /* ---- Section padding ---- */
  [style*="padding: '160px"],[style*="padding: '140px"],[style*="padding: '120px"],
  [style*="padding: '100px"],[style*="padding: '96px"],[style*="padding: '80px"] {
    padding: 56px 20px !important;
  }
  /* ---- Hide desktop navs ---- */
  nav[style*="gap: 36"], nav[style*="gap: 40"], nav[style*="gap: 28"] {
    display: none !important;
  }
}

@media (max-width: 560px) {
  [style*="font-size: clamp(72px, 8vw, 128px)"],
  [style*="font-size: 128"],[style*="font-size: 112"],[style*="font-size: 104"] {
    font-size: clamp(28px, 10vw, 48px) !important;
  }
  [style*="font-size: clamp(56px, 6vw, 96px)"],
  [style*="font-size: 96"],[style*="font-size: 88"] {
    font-size: clamp(24px, 8vw, 36px) !important;
  }
  [style*="grid-template-columns: 1fr 1fr 1fr 1fr"],
  [style*="grid-template-columns: 1fr 1fr 1fr"]:not([style*="1fr 1fr 1fr 1fr"]),
  [style*="grid-template-columns: repeat(4"],
  [style*="grid-template-columns: repeat(3"],
  [style*="grid-template-columns: repeat(6"],
  [style*="grid-template-columns: repeat(12"] {
    grid-template-columns: 1fr !important;
  }
  [style*="padding: '160px"],[style*="padding: '140px"],[style*="padding: '120px"],
  [style*="padding: '100px"],[style*="padding: '96px"],[style*="padding: '80px"],
  [style*="padding: '64px"] {
    padding: 40px 16px !important;
  }
}

@media (max-width: 380px) {
  [style*="font-size: clamp(72px, 8vw, 128px)"],
  [style*="font-size: 128"],[style*="font-size: 112"],[style*="font-size: 104"] {
    font-size: clamp(26px, 10vw, 38px) !important;
  }
  [style*="font-size: clamp(56px, 6vw, 96px)"],
  [style*="font-size: 96"],[style*="font-size: 88"] {
    font-size: clamp(22px, 8vw, 32px) !important;
  }
}

@media (hover: none) {
  *:hover { transform: none !important; }
}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style id="mobile-safety-net-v2">
/* ===== Mobile safety net (v2) — voorkomt horizontal scroll + fixt image-breakage ===== */
@media (max-width: 900px) {
  /* Geen horizontal scroll, punt. */
  html, body { overflow-x: hidden !important; max-width: 100vw; }
  #root { overflow-x: hidden; max-width: 100vw; }

  /* Responsive media defaults */
  img, video, picture, iframe, svg { max-width: 100% !important; }
  img, video, picture { height: auto; }

  /* Neutralize brede inline min-widths (React inline styles) */
  [style*="min-width: 12"], [style*="min-width: 13"], [style*="min-width: 14"],
  [style*="min-width: 15"], [style*="min-width: 16"], [style*="min-width: 18"],
  [style*="min-width: 20"], [style*="min-width: 24"], [style*="min-width: 28"],
  [style*="min-width:12"], [style*="min-width:14"], [style*="min-width:16"] {
    min-width: 0 !important;
  }

  /* Forceer vloeiende breedte voor containers met vaste >1200px width */
  [style*="width: 1200"], [style*="width: 1280"], [style*="width: 1320"],
  [style*="width: 1400"], [style*="width: 1440"], [style*="width: 1600"] {
    width: 100% !important;
    max-width: 100% !important;
  }

  /* Fix grid-auto-rows conflicten die images platdrukken op gestackte grids */
  .show-g, .cat-grid, .work-grid, .gal-g, .cuts,
  .quick-g, .team-g, .rev-g, .press-logos,
  .how-grid, .hero-bot, .menu-row, .counters,
  .foot-g, .grid-4, .fp-g, .specs-g,
  .v1-row, .v3-step, .v4-service {
    grid-auto-rows: auto !important;
  }

  /* Image-containers die op desktop via grid-height vulden — geef ze een aspect */
  .cut img, .w img, .wk img, .m img, .hv-main img, .hero-img img,
  .s .img img, .phil-im img, .gal-g img, .news img, .split-image img,
  .team img, .cat-grid img, .work-grid img, .press-logos img,
  .r img, .rev-card img {
    width: 100% !important;
    height: 100% !important;
    object-fit: cover;
  }

  /* Hero-visual containers: geen rigide min-height op mobiel */
  .hero-img, .hero-vis, .hv-main, .hero-im, .phil-im {
    min-height: 0 !important;
  }
}

@media (max-width: 560px) {
  /* Hero-visuals krijgen een vriendelijke ratio in plaats van 520px hoog */
  .hero-img, .hv-main, .phil-im, .hero-im {
    aspect-ratio: 4/3 !important;
    height: auto !important;
  }

  /* Cells in eerder grid-auto-rows grids hun eigen ratio */
  .cut, .w, .wk, .m {
    aspect-ratio: 3/2 !important;
    height: auto !important;
  }

  /* Tabel-achtige grids met expliciete px-kolommen platslaan */
  [style*="gridTemplateColumns: '80px"],
  [style*="grid-template-columns: 80px"],
  [style*="gridTemplateColumns: 'auto 1fr auto auto"],
  .table-row, .w-row {
    display: flex !important;
    flex-direction: column !important;
    gap: 6px !important;
  }

  /* Tickers/marquees minder agressief op small screens */
  .marq, .ticker, .ticker-track {
    font-size: 16px !important;
  }
}

@media (max-width: 380px) {
  /* Nog smaller: alles single-column */
  [style*="gridTemplateColumns"], [style*="grid-template-columns"] {
    grid-template-columns: 1fr !important;
  }
  /* Extra tight padding op kleinste telefoon */
  section, .sec, .wrap { padding-left: 14px !important; padding-right: 14px !important; }
}
</style>
<link rel="stylesheet" href="/assets/mobile-v3-global.css">
<style id="mobile-v3-patches">
  @media (max-width: 560px) {
    /* Topbar 4-col grid overflow fix */
    [style*="gridTemplateColumns: 'auto 1fr auto auto'"],
    [style*="grid-template-columns: auto 1fr auto auto"],
    [style*="gridTemplateColumns: '80px 1fr 1fr 100px'"],
    [style*="grid-template-columns: 80px 1fr 1fr 100px"] {
      grid-template-columns: 1fr !important;
      gap: 8px !important;
    }
    /* Section wrappers full width */
    section { max-width: 100% !important; padding-inline: 20px !important; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
// Variation 1 — Editorial & Quiet
// Serif display type, generous whitespace, muted warm neutrals.
// The studio as a thoughtful craftsman.

const V1 = () => {
  const [scrollY, setScrollY] = React.useState(0);
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const onScroll = () => setScrollY(el.scrollTop);
    el.addEventListener('scroll', onScroll);
    return () => el.removeEventListener('scroll', onScroll);
  }, []);

  const v1Styles = {
    bg: '#f1ede5',
    ink: '#1a1713',
    muted: '#6b6055',
    rule: 'rgba(26,23,19,0.14)',
    accent: '#a85a2a',
    serif: '"EB Garamond", "Cormorant Garamond", Georgia, serif',
    mono: '"JetBrains Mono", ui-monospace, monospace',
  };

  const Placeholder = ({ label, h = 280, img }) => (
    <div style={{
      height: h, width: '100%', position: 'relative', overflow: 'hidden',
      background: `#e3ddd1 url("${img}") center/cover no-repeat`,
    }}>
      <div style={{ position: 'absolute', inset: 0, background: 'linear-gradient(180deg, rgba(26,23,19,0) 55%, rgba(26,23,19,0.28) 100%)' }} />
      <div style={{
        position: 'absolute', left: 14, bottom: 12,
        fontFamily: v1Styles.mono, fontSize: 10, letterSpacing: '0.1em',
        color: 'rgba(255,255,255,0.9)', textTransform: 'uppercase',
        mixBlendMode: 'normal',
      }}>{label}</div>
    </div>
  );

  const Rule = () => <div style={{ height: 1, background: v1Styles.rule, width: '100%' }} />;

  const works = [
    { n: '01', client: 'Noorderhaven Atelier', kind: 'Webdesign & bouw', year: '2025' },
    { n: '02', client: 'Stroom Koffiebranders', kind: 'Merkidentiteit, web', year: '2025' },
    { n: '03', client: 'Museum De Wijk', kind: 'Digital platform', year: '2024' },
    { n: '04', client: 'Kade 17 Vastgoed', kind: 'Webdesign', year: '2024' },
    { n: '05', client: 'Boekhandel Veenstra', kind: 'E-commerce', year: '2023' },
  ];

  return (
    <div ref={ref} style={{
      width: '100%', height: '100%', overflow: 'auto',
      background: v1Styles.bg, color: v1Styles.ink,
      fontFamily: v1Styles.serif,
      fontSize: 17, lineHeight: 1.55,
    }}>
      {/* Top bar */}
      <div style={{
        position: 'sticky', top: 0, zIndex: 10, background: v1Styles.bg,
        borderBottom: `1px solid ${v1Styles.rule}`,
      }}>
        <div style={{ maxWidth: 1280, margin: '0 auto', padding: '22px 56px', display: 'flex', alignItems: 'baseline', justifyContent: 'space-between' }}>
          <div style={{ fontSize: 20, letterSpacing: '-0.01em', fontStyle: 'italic' }}>Fessa <span style={{ fontStyle: 'normal' }}>Studio</span></div>
          <nav style={{ display: 'flex', gap: 36, fontFamily: v1Styles.mono, fontSize: 11, letterSpacing: '0.12em', textTransform: 'uppercase', color: v1Styles.muted }}>
            <a style={{ color: 'inherit', textDecoration: 'none' }} href="#werk">Werk</a>
            <a style={{ color: 'inherit', textDecoration: 'none' }} href="#studio">Studio</a>
            <a style={{ color: 'inherit', textDecoration: 'none' }} href="#diensten">Diensten</a>
            <a style={{ color: 'inherit', textDecoration: 'none' }} href="#contact">Contact</a>
          </nav>
          <div style={{ fontFamily: v1Styles.mono, fontSize: 11, letterSpacing: '0.12em', color: v1Styles.muted }}>NL · EN</div>
        </div>
      </div>

      {/* Hero */}
      <section style={{ maxWidth: 1280, margin: '0 auto', padding: '120px 56px 100px' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 64, fontFamily: v1Styles.mono, fontSize: 11, letterSpacing: '0.12em', textTransform: 'uppercase', color: v1Styles.muted }}>
          <div>— Digitale studio, sinds 2019</div>
          <div>Utrecht / Remote</div>
        </div>
        <h1 style={{
          fontFamily: v1Styles.serif, fontWeight: 400,
          fontSize: 'clamp(72px, 8vw, 128px)', lineHeight: 0.96,
          letterSpacing: '-0.035em', margin: 0,
        }}>
          Websites<br />
          met <em style={{ fontStyle: 'italic' }}>aandacht</em><br />
          gebouwd.
        </h1>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 80, marginTop: 96 }}>
          <div style={{ fontFamily: v1Styles.mono, fontSize: 11, letterSpacing: '0.12em', textTransform: 'uppercase', color: v1Styles.muted }}>
            Wat wij doen
          </div>
          <p style={{ margin: 0, fontSize: 22, lineHeight: 1.5, maxWidth: 540 }}>
            Fessa Studio ontwerpt en bouwt digitale producten voor culturele instellingen, ondernemers en merken die de moeite waard zijn. Rustig, doordacht, precies.
          </p>
        </div>
      </section>

      <Rule />

      {/* Selected work */}
      <section id="werk" style={{ maxWidth: 1280, margin: '0 auto', padding: '80px 56px 40px' }}>
        <div style={{ display: 'grid', gridTemplateColumns: '200px 1fr', gap: 48, marginBottom: 56 }}>
          <div style={{ fontFamily: v1Styles.mono, fontSize: 11, letterSpacing: '0.12em', textTransform: 'uppercase', color: v1Styles.muted, paddingTop: 12 }}>
            Geselecteerd werk<br />2023 — 2025
          </div>
          <h2 style={{ fontWeight: 400, fontSize: 56, margin: 0, lineHeight: 1.05, letterSpacing: '-0.02em', maxWidth: 720 }}>
            Een handvol projecten, zorgvuldig samengesteld.
          </h2>
        </div>

        <Rule />
        {works.map((w, i) => (
          <React.Fragment key={w.n}>
            <div
              className="v1-row"
              style={{
                display: 'grid', gridTemplateColumns: '80px 1fr 1fr 100px',
                padding: '28px 0', alignItems: 'baseline', gap: 24,
                cursor: 'pointer',
              }}
            >
              <div style={{ fontFamily: v1Styles.mono, fontSize: 12, color: v1Styles.muted }}>{w.n}</div>
              <div style={{ fontSize: 28, letterSpacing: '-0.01em' }}>{w.client}</div>
              <div style={{ fontStyle: 'italic', color: v1Styles.muted, fontSize: 18 }}>{w.kind}</div>
              <div style={{ fontFamily: v1Styles.mono, fontSize: 12, color: v1Styles.muted, textAlign: 'right' }}>{w.year}</div>
            </div>
            <Rule />
          </React.Fragment>
        ))}
      </section>

      {/* Featured case */}
      <section style={{ maxWidth: 1280, margin: '0 auto', padding: '80px 56px' }}>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 56, alignItems: 'center' }}>
          <Placeholder label="Case · Stroom Koffiebranders" h={520} img="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=1200&q=80" />
          <div>
            <div style={{ fontFamily: v1Styles.mono, fontSize: 11, letterSpacing: '0.12em', textTransform: 'uppercase', color: v1Styles.muted, marginBottom: 20 }}>
              Uitgelichte case — 2025
            </div>
            <h3 style={{ fontWeight: 400, fontSize: 44, margin: '0 0 24px', lineHeight: 1.1, letterSpacing: '-0.02em' }}>
              Een webshop die net zo zorgvuldig is als de koffie.
            </h3>
            <p style={{ fontSize: 19, lineHeight: 1.6, color: '#3a332c', margin: '0 0 32px' }}>
              Voor Stroom ontwierpen we een rustige, lezende webwinkel. Geen banners, geen pop‑ups — wel verhalen, herkomst en een checkout die niet in de weg loopt.
            </p>
            <a style={{
              display: 'inline-flex', alignItems: 'center', gap: 10,
              borderBottom: `1px solid ${v1Styles.ink}`, paddingBottom: 3,
              fontFamily: v1Styles.mono, fontSize: 12, letterSpacing: '0.1em',
              textTransform: 'uppercase', color: v1Styles.ink, textDecoration: 'none',
            }}>
              Bekijk de case <span>→</span>
            </a>
          </div>
        </div>
      </section>

      <Rule />

      {/* Studio / Services two-col */}
      <section id="studio" style={{ maxWidth: 1280, margin: '0 auto', padding: '80px 56px', display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 96 }}>
        <div>
          <div style={{ fontFamily: v1Styles.mono, fontSize: 11, letterSpacing: '0.12em', textTransform: 'uppercase', color: v1Styles.muted, marginBottom: 20 }}>
            De studio
          </div>
          <h3 style={{ fontWeight: 400, fontSize: 36, margin: '0 0 24px', lineHeight: 1.15, letterSpacing: '-0.015em' }}>
            Klein, bewust klein.
          </h3>
          <p style={{ fontSize: 18, lineHeight: 1.65, color: '#3a332c', margin: 0 }}>
            Fessa is een onafhankelijke studio van drie mensen. We werken aan een beperkt aantal projecten per jaar, zodat elk project alle aandacht krijgt die het verdient. Van strategie tot laatste pixel — alles gebeurt in huis.
          </p>
        </div>
        <div id="diensten">
          <div style={{ fontFamily: v1Styles.mono, fontSize: 11, letterSpacing: '0.12em', textTransform: 'uppercase', color: v1Styles.muted, marginBottom: 20 }}>
            Diensten
          </div>
          {['Merkidentiteit voor digitaal', 'Webdesign & art direction', 'Webontwikkeling (maatwerk)', 'E‑commerce platformen', 'Content & redactie'].map((s) => (
            <div key={s} style={{ padding: '16px 0', borderBottom: `1px solid ${v1Styles.rule}`, fontSize: 20, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
              <span>{s}</span>
              <span style={{ fontFamily: v1Styles.mono, fontSize: 11, color: v1Styles.muted }}>→</span>
            </div>
          ))}
        </div>
      </section>

      <Rule />

      {/* Contact */}
      <section id="contact" style={{ maxWidth: 1280, margin: '0 auto', padding: '120px 56px 140px' }}>
        <div style={{ fontFamily: v1Styles.mono, fontSize: 11, letterSpacing: '0.12em', textTransform: 'uppercase', color: v1Styles.muted, marginBottom: 40 }}>
          Aan het werk — plek vanaf september 2026
        </div>
        <h2 style={{ fontWeight: 400, fontSize: 'clamp(56px, 6vw, 96px)', lineHeight: 1.02, letterSpacing: '-0.03em', margin: '0 0 48px', maxWidth: 1000 }}>
          Een idee, een merk, een <em>vraagstuk?</em> <br />Laat het ons weten.
        </h2>
        <a href="mailto:hallo@fessastudio.nl" style={{
          display: 'inline-block', fontSize: 40, color: v1Styles.ink,
          borderBottom: `1px solid ${v1Styles.ink}`, paddingBottom: 6,
          textDecoration: 'none', letterSpacing: '-0.01em',
        }}>hallo@fessastudio.nl</a>
      </section>

      {/* Footer */}
      <footer style={{ borderTop: `1px solid ${v1Styles.rule}` }}>
        <div style={{ maxWidth: 1280, margin: '0 auto', padding: '32px 56px', display: 'flex', justifyContent: 'space-between', fontFamily: v1Styles.mono, fontSize: 11, letterSpacing: '0.12em', textTransform: 'uppercase', color: v1Styles.muted }}>
          <div>© Fessa Studio 2026</div>
          <div>KvK 76543210 · BTW NL0012345B01</div>
          <div>Instagram / LinkedIn / Are.na</div>
        </div>
      </footer>

      <style>{`
        .v1-row { transition: padding-left .3s cubic-bezier(.2,.7,.3,1); }
        .v1-row:hover { padding-left: 24px !important; }
      `}</style>
    </div>
  );
};

window.V1 = V1;


ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(V1));
</script>
</body>
</html>
