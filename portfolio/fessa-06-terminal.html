<!doctype html>

<title>Fessa Studio - 06-terminal</title>

<body>
<div id="root"></div>
<script type="text/babel">
// Variation 6 тАФ Brutalist Terminal
// Mono grid, CRT scanlines, glitch hero, 3D tilt cards on hover,
// ASCII art accents, terminal status bar.

const V6 = () => {
  const v6Styles = {
    bg: '#0a0a0a',
    ink: '#e8e6e0',
    dim: '#6b6862',
    accent: '#00ff88',
    warn: '#ff3366',
    mono: '"JetBrains Mono", ui-monospace, monospace',
    sans: '"Inter Tight", system-ui, sans-serif',
    display: '"Instrument Serif", Georgia, serif',
  };

  const [cmd, setCmd] = React.useState(0);
  const cmds = ['> fessa --init', '> loading /studio ...', '> ready. welcome.'];
  React.useEffect(() => {
    const id = setInterval(() => setCmd((c) => (c + 1) % cmds.length), 2000);
    return () => clearInterval(id);
  }, []);

  const tiltRef = React.useRef({});
  const onTilt = (key) => (e) => {
    const el = e.currentTarget;
    const r = el.getBoundingClientRect();
    const x = (e.clientX - r.left) / r.width - 0.5;
    const y = (e.clientY - r.top) / r.height - 0.5;
    el.style.transform = `perspective(1200px) rotateY(${x * 14}deg) rotateX(${-y * 14}deg) translateZ(20px)`;
  };
  const onTiltOut = (e) => {
    e.currentTarget.style.transform = '';
  };

  const projects = [
    { id: '001', t: 'NOORDERHAVEN', k: 'ID/WEB/CMS', y: '2025', img: 'https://images.unsplash.com/photo-1497366216548-37526070297c?w=1000&q=80' },
    { id: '002', t: 'STROOM', k: 'COMMERCE', y: '2025', img: 'https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=1000&q=80' },
    { id: '003', t: 'DE_WIJK', k: 'PLATFORM', y: '2024', img: 'https://images.unsplash.com/photo-1545987796-200677ee1011?w=1000&q=80' },
    { id: '004', t: 'KADE_17', k: 'WEBSITE', y: '2024', img: 'https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?w=1000&q=80' },
  ];

  return (
    <div style={{
      width: '100%', height: '100%', overflow: 'auto',
      background: v6Styles.bg, color: v6Styles.ink,
      fontFamily: v6Styles.mono, fontSize: 14, position: 'relative',

      {/* Scanlines */}
      <div style={{
        position: 'fixed', inset: 0, pointerEvents: 'none', zIndex: 5,
        background: 'repeating-linear-gradient(0deg, rgba(0,0,0,0.18) 0, rgba(0,0,0,0.18) 1px, transparent 1px, transparent 3px)',
        mixBlendMode: 'multiply',

      {/* Vignette */}

        position: 'fixed', inset: 0, pointerEvents: 'none', zIndex: 6,
        background: 'radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.55) 100%)',

      {/* Terminal status bar */}
      <div style={{
        position: 'sticky', top: 0, zIndex: 20,
        background: v6Styles.bg, borderBottom: `1px solid ${v6Styles.dim}`,

        display: 'grid', gridTemplateColumns: 'auto 1fr auto auto auto', gap: 24,

        <span style={{ color: v6Styles.warn }}>STATUS: 02 OPEN SLOTS</span>
        <span style={{ color: v6Styles.ink }}>26.04.2026</span>
      </div>

      {/* Top nav grid */}

      {/* Hero */}

        <div style={{ maxWidth: 1400, margin: '0 auto' }}>
          <div style={{ fontSize: 12, color: v6Styles.accent, marginBottom: 40, minHeight: 20 }}>
            {cmds[cmd]}<span className="v6-blink">_</span>

            fontFamily: v6Styles.sans, fontWeight: 700,

            letterSpacing: '-0.05em', margin: 0, position: 'relative',

              </div>
              <div style={{ color: v6Styles.dim, fontSize: 13, fontFamily: v6Styles.mono, letterSpacing: '0.05em' }}>
                &gt; digital studio ┬╖ independent<br />
                &gt; est. 2019<br />
                &gt; utrecht, netherlands (+1 remote)
              </div>
            </div>
            <pre style={{ fontSize: 10, color: v6Styles.accent, margin: 0, lineHeight: 1.2 }}>{`
    тХФтХРтХРтХРтХРтХРтХРтХРтХЧ
    тХС тЦУтЦУтЦУтЦУтЦУ тХС
    тХС тЦУтЦСтЦСтЦСтЦУ тХС
    тХС тЦУтЦС*тЦСтЦУ тХС

    тХЪтХРтХРтХРтХРтХРтХРтХРтХЭ
     fessa.1
            `}</pre>

        background: `linear-gradient(135deg, transparent 49%, ${v6Styles.dim}11 50%, transparent 51%)`,

        <div style={{ maxWidth: 1400, margin: '0 auto' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 48 }}>

            </div>
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 32, perspective: '1200px' }}>
            {projects.map((p) => (
              <div
                key={p.id}
                onMouseMove={onTilt(p.id)}
                onMouseLeave={onTiltOut}
                className="v6-card"
                style={{
                  position: 'relative', border: `1px solid ${v6Styles.dim}`,
                  padding: 16, transition: 'transform 0.4s cubic-bezier(.2,.7,.3,1), border-color 0.3s',
                  transformStyle: 'preserve-3d',
                }}
              >
                <div style={{ position: 'relative', height: 360, overflow: 'hidden', marginBottom: 16 }}>
                  <img src={p.img} alt="" style={{
                    width: '100%', height: '100%', objectFit: 'cover',
                    filter: 'saturate(0.3) contrast(1.2) brightness(0.9)',
                    display: 'block',
                  }} />
                  <div style={{
                    position: 'absolute', inset: 0,
                    background: `linear-gradient(135deg, ${v6Styles.accent}20, transparent 50%)`,
                    mixBlendMode: 'screen',
                  }} />
                  <div style={{
                    position: 'absolute', top: 12, left: 12, fontSize: 10,
                    color: v6Styles.accent, background: 'rgba(0,0,0,0.7)',
                    padding: '3px 8px', letterSpacing: '0.1em',
                  }}>ID_{p.id}</div>
                  <div style={{
                    position: 'absolute', top: 12, right: 12, fontSize: 10,
                    color: v6Styles.ink, background: 'rgba(0,0,0,0.7)',
                    padding: '3px 8px',
                  }}>{p.y}</div>
                </div>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' }}>
                  <div>
                    <div style={{ fontFamily: v6Styles.sans, fontSize: 32, fontWeight: 700, letterSpacing: '-0.02em' }}>{p.t}</div>
                    <div style={{ fontSize: 11, color: v6Styles.dim, marginTop: 4, letterSpacing: '0.1em' }}>&gt; {p.k}</div>
                  </div>
                  <div style={{ fontSize: 20, color: v6Styles.accent }}>тЖЧ</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* ASCII divider */}
      <section style={{ padding: '40px', textAlign: 'center', color: v6Styles.dim, fontSize: 10, letterSpacing: '0.2em', borderTop: `1px dashed ${v6Styles.dim}`, borderBottom: `1px dashed ${v6Styles.dim}` }}>
        тФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБ
      </section>

      <section id="diensten" style={{ padding: '100px 40px' }}>
        <div style={{ maxWidth: 1400, margin: '0 auto' }}>
          <h2 style={{ fontFamily: v6Styles.sans, fontSize: 'clamp(56px, 7vw, 108px)', fontWeight: 700, lineHeight: 0.95, letterSpacing: '-0.04em', margin: '0 0 64px', maxWidth: 1100 }}>
            <span style={{ color: v6Styles.accent }}>#</span> wat we maken тАФ<br />
            <span style={{ fontFamily: v6Styles.display, fontStyle: 'italic', fontWeight: 400, color: v6Styles.accent }}>alles in huis.</span>
          </h2>

          <div style={{ border: `1px solid ${v6Styles.dim}` }}>
            <div style={{ display: 'grid', gridTemplateColumns: '80px 1fr 2fr 120px', padding: '14px 24px', borderBottom: `1px solid ${v6Styles.dim}`, fontSize: 11, color: v6Styles.dim, letterSpacing: '0.1em' }}>
              <span>ID</span>
              <span>DIENST</span>
              <span>OMSCHRIJVING</span>
              <span style={{ textAlign: 'right' }}>STACK</span>
            </div>
            {[
              { id: 'S.01', t: 'Strategie', d: 'Positionering, IA, tone of voice', s: 'brain.exe' },
              { id: 'S.02', t: 'Identiteit', d: 'Visuele taal voor digitale kanalen', s: 'figma' },
              { id: 'S.03', t: 'Webdesign', d: 'Maatwerk UI, art direction', s: 'figma + code' },
              { id: 'S.04', t: 'Development', d: 'Snelle, toegankelijke websites & apps', s: 'next ┬╖ astro' },
              { id: 'S.05', t: 'CMS', d: 'Redactievriendelijke content systemen', s: 'sanity ┬╖ payload' },
              { id: 'S.06', t: 'E-commerce', d: 'Schaalbare webshops met karakter', s: 'shopify ┬╖ custom' },
            ].map((s) => (
              <div key={s.id} className="v6-row" style={{
                display: 'grid', gridTemplateColumns: '80px 1fr 2fr 120px', padding: '20px 24px',
                borderBottom: `1px solid ${v6Styles.dim}`, alignItems: 'center',
                fontSize: 14,
              }}>
                <span style={{ color: v6Styles.accent }}>{s.id}</span>
                <span style={{ fontFamily: v6Styles.sans, fontSize: 22, fontWeight: 600, letterSpacing: '-0.01em' }}>{s.t}</span>
                <span style={{ color: v6Styles.dim, fontFamily: v6Styles.sans, fontSize: 15 }}>{s.d}</span>
                <span style={{ textAlign: 'right', color: v6Styles.ink, fontSize: 12 }}>{s.s}</span>
              </div>

          </div>
        </div>
      </section>

      {/* Contact */}
      <section id="contact" style={{ padding: '120px 40px 60px', borderTop: `1px solid ${v6Styles.dim}` }}>
        <div style={{ maxWidth: 1400, margin: '0 auto' }}>
          <div style={{ fontSize: 12, color: v6Styles.accent, marginBottom: 32 }}>$ fessa --contact</div>
          <h2 style={{
            fontFamily: v6Styles.sans, fontSize: 'clamp(80px, 11vw, 200px)',

            <a href="mailto:hallo@fessastudio.nl" className="v6-mail" style={{
              fontFamily: v6Styles.sans, fontSize: 36, fontWeight: 500,
              color: v6Styles.ink, textDecoration: 'none', letterSpacing: '-0.02em',
            }}>
              hallo@fessastudio.nl <span style={{ color: v6Styles.accent }}>тЖТ</span>
            </a>
            <div style={{ fontSize: 13, lineHeight: 1.9, color: v6Styles.dim, letterSpacing: '0.04em' }}>
              FESSA.STUDIO тАФ BV<br />

      <style>{`
        .v6-blink { animation: v6blink 1s steps(2) infinite; color: ${v6Styles.accent}; }
        @keyframes v6blink { 50% { opacity: 0; } }
        .v6-glitch { color: ${v6Styles.ink}; }
        .v6-glitch::before, .v6-glitch::after {
          content: attr(data-text); position: absolute; top: 0; left: 0; width: 100%; height: 100%;
          pointer-events: none; white-space: pre-line;
        }
        .v6-glitch::before { color: ${v6Styles.accent}; animation: v6gl1 3s infinite steps(1); mix-blend-mode: screen; }
        .v6-glitch::after { color: ${v6Styles.warn}; animation: v6gl2 3.4s infinite steps(1); mix-blend-mode: screen; }
        @keyframes v6gl1 { 0%,97%,100% { clip-path: inset(0 0 100% 0); transform: translate(0); } 98% { clip-path: inset(10% 0 80% 0); transform: translate(-3px,0); } 99% { clip-path: inset(55% 0 30% 0); transform: translate(3px,0); } }
        @keyframes v6gl2 { 0%,95%,100% { clip-path: inset(0 0 100% 0); transform: translate(0); } 96% { clip-path: inset(30% 0 50% 0); transform: translate(2px,0); } 97% { clip-path: inset(70% 0 10% 0); transform: translate(-2px,0); } }
