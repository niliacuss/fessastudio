<!doctype html>

<style>

  /* Responsive overrides for inline React grids */

    header > div { flex-wrap: wrap !important; gap: 14px !important; padding: 14px 20px !important; }

    header input { font-size: 14px !important; }
    section { padding-left: 20px !important; padding-right: 20px !important; }

    [style*="grid-template-columns: repeat(6, 1fr)"],
    [style*="grid-template-columns: repeat(4, 1fr)"],
    [style*="grid-template-columns: 1fr 1fr 1fr"],
    [style*="grid-template-columns: 1.3fr 1fr"] { grid-template-columns: 1fr !important; }

  @media (max-width: 560px) {

    [style*="grid-template-columns: repeat(4, 1fr)"],
    [style*="grid-template-columns: 1fr 1fr"] { grid-template-columns: 1fr 1fr !important; }
    [style*="font-size: 44"] { font-size: 28px !important; }
  }
  /* ===== Mobile optimalisaties (nieuw) ===== */
  @media (max-width: 768px) {
    [style*="font-size: clamp(72px"],
    [style*="font-size: clamp(80px"],
    [style*="font-size: clamp(92px"] { font-size: clamp(36px, 10vw, 72px) !important; line-height: 1.05 !important; overflow-wrap: break-word; hyphens: auto; }
    [style*="font-size: 64"],[style*="font-size: 72"] { font-size: clamp(28px, 7vw, 52px) !important; line-height: 1.1 !important; overflow-wrap: break-word; }
    [style*="font-size: 48"],[style*="font-size: 56"] { font-size: clamp(24px, 6vw, 40px) !important; line-height: 1.1 !important; }
    [style*="font-size: 32"],[style*="font-size: 36"] { font-size: clamp(20px, 5vw, 30px) !important; line-height: 1.15 !important; }
    [style*="grid-template-columns: repeat(3, 1fr)"] { grid-template-columns: repeat(2, 1fr) !important; }
    section { padding: 56px 20px !important; }
  }
  @media (max-width: 560px) {
    [style*="font-size: clamp(72px"],
    [style*="font-size: clamp(80px"],
    [style*="font-size: clamp(92px"] { font-size: clamp(32px, 10vw, 52px) !important; }
    [style*="font-size: 64"],[style*="font-size: 72"] { font-size: clamp(26px, 8vw, 40px) !important; }
    [style*="grid-template-columns: repeat(3, 1fr)"] { grid-template-columns: 1fr !important; }
    section { padding: 40px 16px !important; }
  }
  @media (max-width: 380px) {
    [style*="font-size: clamp(72px"],
    [style*="font-size: clamp(80px"],
    [style*="font-size: clamp(92px"] { font-size: clamp(28px, 10vw, 40px) !important; }
    [style*="font-size: 64"],[style*="font-size: 72"] { font-size: clamp(24px, 8vw, 36px) !important; }
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<style id="mobile-safety-net-v2">
/* ===== Mobile safety net (v2) — voorkomt horizontal scroll + fixt image-breakage ===== */
@media (max-width: 900px) {
  /* Geen horizontal scroll, punt. */
  html, body { overflow-x: hidden !important; max-width: 100vw; }
  #root { overflow-x: hidden; max-width: 100vw; }

  /* Responsive media defaults */
  img, video, picture, iframe, svg { max-width: 100% !important; }
  img, video, picture { height: auto; }

  /* Neutralize brede inline min-widths (React inline styles) */
  [style*="min-width: 12"], [style*="min-width: 13"], [style*="min-width: 14"],
  [style*="min-width: 15"], [style*="min-width: 16"], [style*="min-width: 18"],
  [style*="min-width: 20"], [style*="min-width: 24"], [style*="min-width: 28"],
  [style*="min-width:12"], [style*="min-width:14"], [style*="min-width:16"] {
    min-width: 0 !important;
  }

  /* Forceer vloeiende breedte voor containers met vaste >1200px width */
  [style*="width: 1200"], [style*="width: 1280"], [style*="width: 1320"],
  [style*="width: 1400"], [style*="width: 1440"], [style*="width: 1600"] {
    width: 100% !important;
    max-width: 100% !important;
  }

  /* Fix grid-auto-rows conflicten die images platdrukken op gestackte grids */
  .show-g, .cat-grid, .work-grid, .gal-g, .cuts,
  .quick-g, .team-g, .rev-g, .press-logos,
  .how-grid, .hero-bot, .menu-row, .counters,
  .foot-g, .grid-4, .fp-g, .specs-g,
  .v1-row, .v3-step, .v4-service {
    grid-auto-rows: auto !important;
  }

  /* Image-containers die op desktop via grid-height vulden — geef ze een aspect */
  .cut img, .w img, .wk img, .m img, .hv-main img, .hero-img img,
  .s .img img, .phil-im img, .gal-g img, .news img, .split-image img,
  .team img, .cat-grid img, .work-grid img, .press-logos img,
  .r img, .rev-card img {
    width: 100% !important;
    height: 100% !important;
    object-fit: cover;
  }

  /* Hero-visual containers: geen rigide min-height op mobiel */
  .hero-img, .hero-vis, .hv-main, .hero-im, .phil-im {
    min-height: 0 !important;
  }
}

@media (max-width: 560px) {
  /* Hero-visuals krijgen een vriendelijke ratio in plaats van 520px hoog */
  .hero-img, .hv-main, .phil-im, .hero-im {
    aspect-ratio: 4/3 !important;
    height: auto !important;
  }

  /* Cells in eerder grid-auto-rows grids hun eigen ratio */
  .cut, .w, .wk, .m {
    aspect-ratio: 3/2 !important;
    height: auto !important;
  }

  /* Tabel-achtige grids met expliciete px-kolommen platslaan */
  [style*="gridTemplateColumns: '80px"],
  [style*="grid-template-columns: 80px"],
  [style*="gridTemplateColumns: 'auto 1fr auto auto"],
  .table-row, .w-row {
    display: flex !important;
    flex-direction: column !important;
    gap: 6px !important;
  }

  /* Tickers/marquees minder agressief op small screens */
  .marq, .ticker, .ticker-track {
    font-size: 16px !important;
  }
}

@media (max-width: 380px) {
  /* Nog smaller: alles single-column */
  [style*="gridTemplateColumns"], [style*="grid-template-columns"] {
    grid-template-columns: 1fr !important;
  }
  /* Extra tight padding op kleinste telefoon */
  section, .sec, .wrap { padding-left: 14px !important; padding-right: 14px !important; }
}
</style>
<link rel="stylesheet" href="/assets/mobile-v3-global.css">
<style id="mobile-v3-patches">
  @media (max-width: 700px) {
    /* Hero image (340px circle) — make static/flow */
    section[style*="padding: '40px 32px 60px'"] img[src*="1542838132"] {
      position: static !important;
      max-width: 100% !important;
      width: 100% !important;
      height: auto !important;
      aspect-ratio: 1 !important;
      margin-top: 24px !important;
      border-radius: 50% !important;
    }
    /* Hero grid -> 1 col */
    [style*="gridTemplateColumns: '1.15fr 1fr'"] {
      grid-template-columns: 1fr !important;
      gap: 24px !important;
    }
    /* Search input */
    header input[placeholder*="Zoek"] { font-size: 14px !important; }
    /* Topbar smaller, readable */
    div[style*="background: #"] > div[style*="padding: '10px 32px'"] {
      font-size: 12px !important;
      line-height: 1.4 !important;
      flex-wrap: wrap !important;
      gap: 8px !important;
    }
  }
</style>

<div id="root"></div>
<script type="text/babel">
const C = { green: '#1b2818', moss: '#3a5a38', cream: '#fff9ef', tom: '#d6492b', mustard: '#e6a829' };
const serif = '"Fraunces", Georgia, serif';

const App = () => {
  const [q, setQ] = React.useState('');
  const cats = [
    { n: 'Groente & fruit', img: 'https://images.unsplash.com/photo-1542838132-92c53300491e?w=900&q=80' },
    { n: 'Brood & banket',  img: 'https://images.unsplash.com/photo-1509440159596-0249088772ff?w=900&q=80' },
    { n: 'Zuivel & kaas',   img: 'https://images.unsplash.com/photo-1486297678162-eb2a19b0a32d?w=900&q=80' },
    { n: 'Vlees & vis',     img: 'https://images.unsplash.com/photo-1542838132-92c53300491e?w=900&q=80' },
    { n: 'Dranken',         img: 'https://images.unsplash.com/photo-1510629589788-f7a60ac0ba00?w=900&q=80' },
    { n: 'Specialiteiten',  img: 'https://images.unsplash.com/photo-1542838132-92c53300491e?w=900&q=80' },
  ];
  const deals = [
    { n: 'Hollandse aardbeien', p: '€2,49', o: '€3,29', img: 'https://images.unsplash.com/photo-1464965911861-746a04b4bca6?w=700&q=80' },
    { n: 'Griekse yoghurt 1kg', p: '€3,19', o: '€4,49', img: 'https://images.unsplash.com/photo-1488477181946-6428a0291777?w=700&q=80' },
    { n: 'Desembrood kruim',    p: '€2,79', o: '€3,49', img: 'https://images.unsplash.com/photo-1509440159596-0249088772ff?w=700&q=80' },
    { n: 'Avocado Hass (2 st)', p: '€1,99', o: '€2,79', img: 'https://images.unsplash.com/photo-1523049673857-eb18f1d7b578?w=700&q=80' },
  ];

  return (
    <div>
      {/* Topbar */}
      <div style={{ background: C.green, color: C.cream, fontSize: 13 }}>
        <div style={{ maxWidth: 1320, margin: '0 auto', padding: '10px 32px', display: 'flex', justifyContent: 'space-between' }}>
          <span>Gratis bezorgd boven €35  ·  Vandaag besteld, vanavond in huis</span>
          <span style={{ opacity: 0.7 }}>Klantenservice  ·  Vestigingen  ·  NL / EN</span>
        </div>
      </div>

      {/* Nav */}
      <header style={{ position: 'sticky', top: 0, background: C.cream, zIndex: 10, borderBottom: `1px solid ${C.green}20` }}>
        <div style={{ maxWidth: 1320, margin: '0 auto', padding: '18px 32px', display: 'flex', alignItems: 'center', gap: 32 }}>
          <div style={{ fontFamily: serif, fontSize: 26, fontWeight: 600, letterSpacing: '-0.02em', display: 'flex', alignItems: 'center', gap: 8 }}>
            <svg width="28" height="28" viewBox="0 0 28 28"><circle cx="14" cy="14" r="13" fill={C.tom} /><path d="M14 6 Q 18 10 14 22 Q 10 10 14 6" fill={C.moss} /></svg>
            De Hoek
          </div>
          <nav style={{ display: 'flex', gap: 24, fontSize: 15 }}>
            <a>Aanbiedingen</a><a>Assortiment</a><a>Recepten</a><a>Over ons</a><a>Contact</a>
          </nav>
          <div style={{ flex: 1, maxWidth: 420, marginLeft: 'auto', position: 'relative' }}>
            <input value={q} onChange={e => setQ(e.target.value)} placeholder="Zoek in 18.000+ producten..." style={{ width: '100%', padding: '12px 16px 12px 42px', borderRadius: 999, border: `1px solid ${C.green}30`, background: '#fff', fontSize: 14, fontFamily: 'inherit' }} />
            <svg style={{ position: 'absolute', top: 13, left: 16 }} width="16" height="16" viewBox="0 0 16 16"><circle cx="7" cy="7" r="5" fill="none" stroke={C.green} strokeWidth="1.5" /><path d="M11 11 L14 14" stroke={C.green} strokeWidth="1.5" /></svg>
          </div>
          <button style={{ background: C.green, color: C.cream, border: 'none', padding: '12px 20px', borderRadius: 999, fontSize: 14, fontWeight: 500, cursor: 'pointer', fontFamily: 'inherit' }}>🛒 Mandje · €0,00</button>
        </div>
      </header>

      {/* Hero */}
      <section style={{ padding: '40px 32px 60px' }}>
        <div style={{ maxWidth: 1320, margin: '0 auto', display: 'grid', gridTemplateColumns: '1.15fr 1fr', gap: 32 }}>
          <div style={{ position: 'relative', background: C.moss, color: C.cream, borderRadius: 32, padding: 56, overflow: 'hidden', minHeight: 540 }}>
            <div style={{ fontSize: 14, opacity: 0.8, marginBottom: 16 }}>Weekactie · t/m zondag</div>
            <h1 style={{ fontFamily: serif, fontSize: 'clamp(56px, 6vw, 92px)', lineHeight: 0.98, letterSpacing: '-0.03em', fontWeight: 500, margin: 0 }}>
              Vers van de <br /><span style={{ fontStyle: 'italic' }}>buurt.</span><br />
              Niet van de <br /><span style={{ color: C.mustard }}>hoop.</span>
            </h1>
            <p style={{ fontSize: 19, lineHeight: 1.55, opacity: 0.9, maxWidth: 440, marginTop: 32 }}>
              Groente, fruit en brood van lokale telers en bakkers. Deze week tot 35% korting op seizoensproducten.
            </p>
            <div style={{ display: 'flex', gap: 12, marginTop: 32 }}>
              <a style={{ background: C.tom, color: '#fff', padding: '16px 28px', borderRadius: 999, fontSize: 16, textDecoration: 'none', fontWeight: 500 }}>Bekijk aanbiedingen →</a>
              <a style={{ background: 'transparent', border: '1px solid rgba(255,255,255,0.3)', color: C.cream, padding: '16px 24px', borderRadius: 999, fontSize: 16, textDecoration: 'none' }}>Folder openen</a>
            </div>
            <img src="https://images.unsplash.com/photo-1542838132-92c53300491e?w=900&q=80" alt="" style={{ position: 'absolute', right: -40, bottom: -60, width: 340, height: 340, objectFit: 'cover', borderRadius: '50%', border: `12px solid ${C.moss}`, boxShadow: '0 20px 60px rgba(0,0,0,0.25)' }} />
          </div>

          <div style={{ display: 'grid', gridTemplateRows: '1.2fr 1fr', gap: 24 }}>
            <div style={{ position: 'relative', borderRadius: 32, overflow: 'hidden' }}>
              <img src="https://images.unsplash.com/photo-1542838132-92c53300491e?w=1200&q=80" style={{ width: '100%', height: '100%', objectFit: 'cover' }} />
              <div style={{ position: 'absolute', top: 24, left: 24, background: C.mustard, color: C.green, padding: '6px 14px', borderRadius: 999, fontSize: 13, fontWeight: 600 }}>Nieuw deze week</div>
              <div style={{ position: 'absolute', bottom: 24, left: 24, right: 24, color: '#fff' }}>
                <div style={{ fontFamily: serif, fontSize: 28, fontWeight: 500, letterSpacing: '-0.01em' }}>Italiaanse specialiteiten</div>
                <div style={{ fontSize: 14, opacity: 0.9 }}>Pasta, olie, kaas — rechtstreeks uit Emilia-Romagna</div>
              </div>
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 24 }}>
              <div style={{ background: C.tom, color: '#fff', borderRadius: 24, padding: 28, display: 'flex', flexDirection: 'column', justifyContent: 'space-between' }}>
                <div style={{ fontSize: 60, fontFamily: serif, fontWeight: 600, lineHeight: 1 }}>-30%</div>
                <div style={{ fontSize: 15 }}>op alle biologische groente →</div>
              </div>
              <div style={{ borderRadius: 24, overflow: 'hidden', position: 'relative' }}>
                <img src="https://images.unsplash.com/photo-1509440159596-0249088772ff?w=700&q=80" style={{ width: '100%', height: '100%', objectFit: 'cover' }} />
                <div style={{ position: 'absolute', inset: 0, background: 'linear-gradient(180deg, transparent, rgba(0,0,0,0.6))' }} />
                <div style={{ position: 'absolute', bottom: 20, left: 20, color: '#fff', fontFamily: serif, fontSize: 22, fontWeight: 500 }}>Dagverse<br/>broden</div>
              </div>
            </div>
          </div>
        </div>
      </section>

      {/* Categories */}
      <section style={{ padding: '20px 32px 60px' }}>
        <div style={{ maxWidth: 1320, margin: '0 auto' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 28 }}>
            <h2 style={{ fontFamily: serif, fontSize: 44, fontWeight: 500, letterSpacing: '-0.02em', margin: 0 }}>Waar wil je beginnen?</h2>
            <a style={{ fontSize: 15 }}>Alle categorieën →</a>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(6, 1fr)', gap: 16 }}>
            {cats.map(c => (
              <a key={c.n} style={{ textDecoration: 'none', cursor: 'pointer' }}>
                <div style={{ aspectRatio: '1', borderRadius: 20, overflow: 'hidden', marginBottom: 10 }}>
                  <img src={c.img} alt="" style={{ width: '100%', height: '100%', objectFit: 'cover', transition: 'transform 0.5s' }} onMouseEnter={e => e.currentTarget.style.transform = 'scale(1.08)'} onMouseLeave={e => e.currentTarget.style.transform = ''} />
                </div>
                <div style={{ fontSize: 15, fontWeight: 500 }}>{c.n}</div>
              </a>
            ))}
          </div>
        </div>
      </section>

      {/* Deals */}
      <section style={{ padding: '60px 32px', background: '#fff' }}>
        <div style={{ maxWidth: 1320, margin: '0 auto' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 32 }}>
            <div>
              <div style={{ fontSize: 13, color: C.tom, fontWeight: 600, letterSpacing: '0.08em', textTransform: 'uppercase', marginBottom: 6 }}>Bekijk de folder</div>
              <h2 style={{ fontFamily: serif, fontSize: 48, fontWeight: 500, letterSpacing: '-0.02em', margin: 0 }}>Deze week in de bonus.</h2>
            </div>
            <div style={{ display: 'flex', gap: 8 }}>
              <button style={{ width: 44, height: 44, borderRadius: '50%', border: `1px solid ${C.green}30`, background: 'transparent', cursor: 'pointer' }}>←</button>
              <button style={{ width: 44, height: 44, borderRadius: '50%', border: 'none', background: C.green, color: C.cream, cursor: 'pointer' }}>→</button>
            </div>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 20 }}>
            {deals.map(d => (
              <div key={d.n} style={{ background: C.cream, borderRadius: 20, padding: 20, position: 'relative' }}>
                <div style={{ position: 'absolute', top: 16, right: 16, background: C.tom, color: '#fff', width: 56, height: 56, borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: serif, fontSize: 15, fontWeight: 600, transform: 'rotate(-8deg)' }}>ACTIE</div>
                <div style={{ aspectRatio: '1', borderRadius: 14, overflow: 'hidden', marginBottom: 16 }}>
                  <img src={d.img} alt="" style={{ width: '100%', height: '100%', objectFit: 'cover' }} />

                <div style={{ fontSize: 16, fontWeight: 500, marginBottom: 8 }}>{d.n}</div>
                <div style={{ display: 'flex', alignItems: 'baseline', gap: 10 }}>

          </div>
        </div>
      </section>

      {/* Story with big image */}
      <section style={{ padding: '100px 32px' }}>
        <div style={{ maxWidth: 1320, margin: '0 auto', display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 48, alignItems: 'center' }}>
          <div style={{ borderRadius: 32, overflow: 'hidden', aspectRatio: '4/5' }}>

          </div>
          <div>
            <div style={{ fontSize: 13, color: C.moss, fontWeight: 600, letterSpacing: '0.08em', textTransform: 'uppercase', marginBottom: 16 }}>Ons verhaal</div>
            <h2 style={{ fontFamily: serif, fontSize: 64, fontWeight: 500, letterSpacing: '-0.03em', lineHeight: 1, margin: 0 }}>
              Sinds 1987 de <span style={{ fontStyle: 'italic', color: C.moss }}>buurtwinkel</span> op de hoek.
            </h2>
            <p style={{ fontSize: 18, lineHeight: 1.6, marginTop: 24, color: '#0005' }}>

            </p>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 16, marginTop: 40 }}>
              {[{ k: '38', v: 'jaar op de hoek' }, { k: '120+', v: 'lokale leveranciers' }, { k: '4.8', v: 'klantreviews' }].map(s => (
                <div key={s.v} style={{ borderTop: `1px solid ${C.green}30`, paddingTop: 12 }}>
                  <div style={{ fontFamily: serif, fontSize: 42, fontWeight: 600, color: C.moss, letterSpacing: '-0.02em' }}>{s.k}</div>
                  <div style={{ fontSize: 13, opacity: 0.7 }}>{s.v}</div>
                </div>

            </div>
          </div>
        </div>
      </section>

      {/* Photo grid */}

            <div style={{ fontSize: 14, opacity: 0.7, marginTop: 12, lineHeight: 1.6 }}>Burgemeester Reigerstraat 82<br />3581 KT Utrecht<br />030 — 234 56 78</div>
          </div>
          {[
            { t: 'Winkelen', l: ['Assortiment', 'Aanbiedingen', 'Folder', 'Receptenboek'] },
            { t: 'Service', l: ['Bezorgen', 'Retour', 'Veelgestelde vragen', 'Contact'] },
            { t: 'Over ons', l: ['Onze verhalen', 'Leveranciers', 'Duurzaamheid', 'Werken bij'] },
          ].map(col => (
            <div key={col.t}>
              <div style={{ fontSize: 13, opacity: 0.6, letterSpacing: '0.08em', textTransform: 'uppercase', marginBottom: 14 }}>{col.t}</div>
              {col.l.map(x => <div key={x} style={{ marginBottom: 8, fontSize: 15 }}>{x}</div>)}

        <div style={{ maxWidth: 1320, margin: '0 auto', paddingTop: 24, borderTop: '1px solid rgba(255,255,255,0.1)', display: 'flex', justifyContent: 'space-between', fontSize: 12, opacity: 0.6 }}>
          <span>© Versmarkt De Hoek BV · 2026</span>
          <span>Algemene voorwaarden · Privacy · Cookies</span>

    </div>
  );
};
