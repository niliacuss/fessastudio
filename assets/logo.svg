<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 140" role="img" aria-label="Fessa Studio">
  <defs>
    <style>
      .mark-bg { fill: #1a1714; }
      .mark-shape { fill: #f4efe6; }
      .wordmark { fill: #1a1714; font-family: 'Fraunces', 'Playfair Display', serif; font-weight: 900; font-size: 58px; letter-spacing: -2px; }
      .tagline { fill: #6b655d; font-family: 'Inter', sans-serif; font-size: 11px; letter-spacing: 6px; font-weight: 500; }
    </style>
  </defs>

  <!-- Monogram mark: organic F shape in a soft square -->
  <g transform="translate(0,10)">
    <rect x="0" y="0" width="110" height="110" rx="22" class="mark-bg"/>
    <!-- abstract F made of organic curves echoing moodboard shapes -->
    <path class="mark-shape" d="
      M30 24
      C 28 24, 26 26, 26 29
      L 26 86
      C 26 89, 28 91, 31 91
      C 34 91, 36 89, 36 86
      L 36 62
      C 36 60, 38 58, 40 58
      L 62 58
      C 65 58, 67 56, 67 53
      C 67 50, 65 48, 62 48
      L 40 48
      C 38 48, 36 46, 36 44
      L 36 36
      C 36 34, 38 32, 40 32
      L 76 32
      C 82 32, 86 28, 86 23
      C 86 25, 82 24, 76 24
      Z"/>
    <!-- small organic dot for flair -->
    <circle cx="80" cy="80" r="6" class="mark-shape"/>
  </g>

  <!-- Wordmark -->
  <text x="128" y="78" class="wordmark">Fessa</text>
  <text x="130" y="100" class="tagline">STUDIO</text>
</svg>
